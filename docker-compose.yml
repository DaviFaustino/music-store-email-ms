networks:
  music-store-network:
    driver: bridge

volumes:
  db-data:

services:
  database:
    image: postgres:latest
    container_name: email-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: email
    ports:
      - "5432:5432"
    networks:
      - music-store-network
    volumes:
      - db-data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management
    container_name: email-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - music-store-network
  
  email-service:
    build: .
    container_name: email-service
    ports:
      - "8080:8080"
    environment:
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
    depends_on:
      - database
      - rabbitmq
    networks:
      - music-store-network
